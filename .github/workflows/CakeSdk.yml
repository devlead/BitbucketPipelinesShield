name: Build using Cake.Sdk and File based Cake
on:
  push:
    branches:
      - develop
      - main
      - master
  pull_request:
jobs:
  build:
    name: Build, Publish and Zip
    runs-on: ubuntu-latest
    steps:
      - name: Get the sources
        uses: actions/checkout@v6

      - name: Install .NET SDK (global.json)
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Run Cake File
        uses: cake-build/cake-action@v3
        with:
          file-path: cake.cs
          target: GitHubActions

  deploy:
    name: Deploy to Azure Function
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && success()
    environment: Production
    permissions:
      id-token: write
    steps:
      - name: Download BitbucketPipelinesShield artifact
        id: download-artifact
        uses: actions/download-artifact@v8
        with:
          name: BitbucketPipelinesShield

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Function (Run From Package)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ steps.download-artifact.outputs.download-path }}/BitbucketPipelinesShield.zip
